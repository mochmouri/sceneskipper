<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SceneSkipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
        <line x1="19" y1="3" x2="19" y2="21"/>
      </svg>
      SceneSkipper
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="analyse"  role="tab" aria-selected="true">Analyse</button>
      <button class="tab"        data-tab="history"  role="tab" aria-selected="false">History</button>
      <button class="tab"        data-tab="settings" role="tab" aria-selected="false">Settings</button>
    </nav>
  </header>

  <!-- ── Analyse tab ─────────────────────────────────────────── -->
  <section id="tab-analyse" class="tab-panel active" role="tabpanel">

    <div class="search-row">
      <input
        type="text"
        id="search-input"
        class="input"
        placeholder="Movie or show title…"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn btn-primary" id="btn-search">Search</button>
    </div>

    <div id="search-status" class="status-msg" hidden></div>

    <ul id="results-list" hidden></ul>

    <div id="analyse-done" class="analyse-done" hidden>
      <div id="analyse-done-icon" class="done-icon">✓</div>
      <div id="analyse-done-text"></div>
    </div>

  </section>

  <!-- ── History tab ─────────────────────────────────────────── -->
  <section id="tab-history" class="tab-panel" role="tabpanel" hidden>

    <div id="history-empty" class="empty-state" hidden>
      <div class="empty-icon">📂</div>
      <p>No movies analysed yet.</p>
      <p class="hint">Use the Analyse tab to search for a movie and flag its scenes.</p>
    </div>

    <div id="history-list"></div>

    <div class="history-footer" id="history-footer" hidden>
      <button class="btn btn-ghost btn-sm" id="btn-clear-all">Clear all history</button>
    </div>

  </section>

  <!-- ── Settings tab ────────────────────────────────────────── -->
  <section id="tab-settings" class="tab-panel" role="tabpanel" hidden>

    <div class="setting-group">
      <label class="setting-label" for="gemini-key-input">Gemini API Key</label>
      <div class="api-key-row">
        <input type="password" id="gemini-key-input" class="input" placeholder="AIza…" autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost btn-icon" data-toggle-target="gemini-key-input" title="Show/hide">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="hint">Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.</p>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="os-key-input">OpenSubtitles API Key</label>
      <div class="api-key-row">
        <input type="password" id="os-key-input" class="input" placeholder="API key…" autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost btn-icon" data-toggle-target="os-key-input" title="Show/hide">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="hint">Get a free key at <a href="https://www.opensubtitles.com/en/consumers" target="_blank" rel="noopener">opensubtitles.com</a>.</p>
    </div>

    <div class="setting-group">
      <p class="setting-label">Auto-skip by confidence</p>

      <label class="toggle-row">
        <span class="toggle-label"><span class="confidence-dot dot-high"></span>High — skip immediately</span>
        <input type="checkbox" id="chk-high" class="toggle-input" role="switch">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>

      <label class="toggle-row">
        <span class="toggle-label"><span class="confidence-dot dot-medium"></span>Medium — show banner</span>
        <input type="checkbox" id="chk-medium" class="toggle-input" role="switch">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>

      <label class="toggle-row">
        <span class="toggle-label"><span class="confidence-dot dot-low"></span>Low — show banner</span>
        <input type="checkbox" id="chk-low" class="toggle-input" role="switch">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>

    <div class="setting-actions">
      <button class="btn btn-primary" id="btn-save">Save settings</button>
      <span class="save-feedback" id="save-feedback" hidden>Saved</span>
    </div>

  </section>

  <script src="popup.js"></script>
</body>
</html>
